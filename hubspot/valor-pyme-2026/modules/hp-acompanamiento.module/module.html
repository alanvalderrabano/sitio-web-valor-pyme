{# MÓDULO · Home Acompañamiento — título, párrafos y enlace "Conoce nuestra historia" #}
<section class="hp-acomp hp-section">
  <div class="container">
    <div class="hp-acomp__grid">
      <div class="reveal">
        {% if module.heading %}<h2 class="hp-h2">{{ module.heading }}</h2>{% endif %}
      </div>
      <div class="reveal d1">
        {{ module.bodytext }}
        {% if module.link_text %}<a href="{{ module.link_url.href }}" class="link-more">{{ module.link_text }} <span class="arrow">→</span></a>{% endif %}
      </div>
    </div>
  </div>
</section>
