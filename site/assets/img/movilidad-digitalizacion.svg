<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;">
  <!-- SCOOTER / VESPA CLÁSICA — Ruta Digitalización -->
  <!-- Colores: Rosa #FF005B principal, Morado #6126FF detalles, Oscuro #2F2927 líneas -->
  <!-- Vespa clásica vista de costado, mirando hacia la derecha -->

  <!-- RUEDA TRASERA — centro (72, 170), radio 38 -->
  <circle cx="72" cy="170" r="38" fill="none" stroke="#2F2927" stroke-width="6" stroke-linecap="round"/>
  <circle cx="72" cy="170" r="30" fill="none" stroke="#2F2927" stroke-width="2"/>
  <!-- Rayos rueda trasera (6 rayos) -->
  <line x1="72" y1="170" x2="72" y2="132" stroke="#2F2927" stroke-width="2"/>
  <line x1="72" y1="170" x2="72" y2="208" stroke="#2F2927" stroke-width="2"/>
  <line x1="72" y1="170" x2="34" y2="170" stroke="#2F2927" stroke-width="2"/>
  <line x1="72" y1="170" x2="110" y2="170" stroke="#2F2927" stroke-width="2"/>
  <line x1="72" y1="170" x2="45" y2="143" stroke="#2F2927" stroke-width="2"/>
  <line x1="72" y1="170" x2="99" y2="197" stroke="#2F2927" stroke-width="2"/>
  <line x1="72" y1="170" x2="99" y2="143" stroke="#2F2927" stroke-width="2"/>
  <line x1="72" y1="170" x2="45" y2="197" stroke="#2F2927" stroke-width="2"/>
  <!-- Buje rueda trasera -->
  <circle cx="72" cy="170" r="7" fill="#FF005B" stroke="#2F2927" stroke-width="2"/>

  <!-- RUEDA DELANTERA — centro (175, 170), radio 32 -->
  <circle cx="175" cy="170" r="32" fill="none" stroke="#2F2927" stroke-width="6" stroke-linecap="round"/>
  <circle cx="175" cy="170" r="24" fill="none" stroke="#2F2927" stroke-width="2"/>
  <!-- Rayos rueda delantera (6 rayos) -->
  <line x1="175" y1="170" x2="175" y2="138" stroke="#2F2927" stroke-width="2"/>
  <line x1="175" y1="170" x2="175" y2="202" stroke="#2F2927" stroke-width="2"/>
  <line x1="175" y1="170" x2="143" y2="170" stroke="#2F2927" stroke-width="2"/>
  <line x1="175" y1="170" x2="207" y2="170" stroke="#2F2927" stroke-width="2"/>
  <line x1="175" y1="170" x2="152" y2="147" stroke="#2F2927" stroke-width="2"/>
  <line x1="175" y1="170" x2="198" y2="193" stroke="#2F2927" stroke-width="2"/>
  <line x1="175" y1="170" x2="198" y2="147" stroke="#2F2927" stroke-width="2"/>
  <line x1="175" y1="170" x2="152" y2="193" stroke="#2F2927" stroke-width="2"/>
  <!-- Buje rueda delantera -->
  <circle cx="175" cy="170" r="6" fill="#FF005B" stroke="#2F2927" stroke-width="2"/>

  <!-- CARROCERÍA DE VESPA (cuerpo redondeado característico) -->
  <!-- Cuerpo principal: forma ovalada/orgánica de la vespa -->
  <!-- Usamos un path para el cuerpo principal (perfil de vespa clásica) -->
  <path d="
    M 100 168
    L 100 145
    C 100 120 115 105 138 102
    L 160 100
    C 175 98 185 105 188 118
    L 190 132
    C 195 138 198 145 196 155
    L 194 168
    Z
  " fill="#FF005B" stroke="#2F2927" stroke-width="5" stroke-linejoin="round"/>

  <!-- PARTE DELANTERA (nariz/morro de la vespa) -->
  <path d="
    M 160 100
    C 180 96 200 100 210 115
    C 215 125 212 140 206 150
    L 194 168
    L 175 168
    C 183 155 184 142 180 132
    C 174 118 165 108 160 100
    Z
  " fill="#FF005B" stroke="#2F2927" stroke-width="4" stroke-linejoin="round"/>

  <!-- PARTE TRASERA (cubierta sobre rueda trasera) -->
  <path d="
    M 100 168
    L 100 145
    C 100 132 95 128 88 128
    C 80 128 72 135 72 145
    L 72 170
    L 100 168
    Z
  " fill="#FF005B" stroke="#2F2927" stroke-width="4" stroke-linejoin="round"/>

  <!-- ASIENTO (sillín largo característico de vespa) -->
  <path d="M 108 100 C 108 93 118 88 135 88 C 152 88 168 92 172 100 C 158 98 135 97 108 100 Z" fill="#2F2927" stroke="#2F2927" stroke-width="2"/>
  <!-- Borde del asiento -->
  <path d="M 108 100 C 108 103 120 105 138 105 C 156 105 168 103 172 100" fill="none" stroke="#6126FF" stroke-width="3" stroke-linecap="round"/>

  <!-- MANUBRIO / GUIADOR -->
  <!-- Vástago del guiador: desde la dirección delantera arriba -->
  <line x1="188" y1="118" x2="192" y2="88" stroke="#2F2927" stroke-width="6" stroke-linecap="round"/>
  <!-- Barra horizontal del manubrio -->
  <line x1="178" y1="86" x2="208" y2="86" stroke="#2F2927" stroke-width="5" stroke-linecap="round"/>
  <!-- Puños -->
  <circle cx="178" cy="86" r="5" fill="#6126FF"/>
  <circle cx="208" cy="86" r="5" fill="#6126FF"/>
  <!-- Espejo retrovisor -->
  <ellipse cx="176" cy="80" rx="6" ry="4" fill="#FFFFFF" stroke="#2F2927" stroke-width="2"/>

  <!-- FARO DELANTERO (circular, característico de vespa) -->
  <circle cx="208" cy="118" r="14" fill="#FF005B" stroke="#2F2927" stroke-width="3"/>
  <circle cx="208" cy="118" r="9" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="207" cy="117" r="5" fill="#FFF200" opacity="0.7"/>

  <!-- LUZ TRASERA -->
  <circle cx="76" cy="128" r="7" fill="#6126FF" stroke="#2F2927" stroke-width="2"/>
  <circle cx="76" cy="128" r="4" fill="#FFFFFF" opacity="0.6"/>

  <!-- MOTOR/ESCAPE (parte trasera inferior) -->
  <path d="M 85 165 C 82 158 80 152 82 148 C 84 144 90 144 92 148 L 92 165 Z" fill="#2F2927" stroke="#2F2927" stroke-width="1"/>
  <!-- Tubo de escape -->
  <path d="M 80 160 Q 60 165 45 160 Q 38 157 38 155" fill="none" stroke="#2F2927" stroke-width="4" stroke-linecap="round"/>

  <!-- PEDAL DEL CONDUCTOR -->
  <line x1="104" y1="165" x2="92" y2="175" stroke="#2F2927" stroke-width="4" stroke-linecap="round"/>
  <line x1="88" y1="175" x2="96" y2="177" stroke="#2F2927" stroke-width="3.5" stroke-linecap="round"/>

  <!-- PARABRISAS pequeño (windshield) -->
  <path d="M 192 90 C 195 78 200 72 205 70" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

  <!-- PUNTO DE ESTACIÓN (marca corporativa) -->
  <circle cx="138" cy="105" r="7" fill="#6126FF" stroke="#2F2927" stroke-width="2"/>

  <!-- DECORACIÓN: línea de detalle lateral (franja de vespa) -->
  <path d="M 108 138 C 120 132 140 130 160 132" fill="none" stroke="#6126FF" stroke-width="3" stroke-linecap="round"/>
  <path d="M 108 143 C 122 137 142 136 162 138" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
