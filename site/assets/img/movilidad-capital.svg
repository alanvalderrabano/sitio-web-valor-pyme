<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;">
  <!-- TELEFÉRICO CLÁSICO — Ruta Mercado -->
  <!-- Colores: Morado #6126FF principal, Amarillo #FFF200 ventanas, Oscuro #2F2927 líneas/cable -->
  <!-- Cable diagonal de sup-izq a sup-der; cabina colgando con pinza en el punto medio -->

  <!-- CABLE PRINCIPAL — diagonal de izquierda alta a derecha baja -->
  <line x1="18" y1="42" x2="222" y2="78" stroke="#2F2927" stroke-width="6" stroke-linecap="round"/>

  <!-- POSTE IZQUIERDO -->
  <line x1="28" y1="42" x2="28" y2="210" stroke="#2F2927" stroke-width="7" stroke-linecap="round"/>
  <!-- Base poste izquierdo -->
  <line x1="16" y1="210" x2="40" y2="210" stroke="#2F2927" stroke-width="6" stroke-linecap="round"/>
  <!-- Anclaje cable en poste izquierdo (circulito) -->
  <circle cx="28" cy="42" r="5" fill="#2F2927"/>
  <!-- Tirante diagonal de apoyo izquierdo -->
  <line x1="28" y1="60" x2="18" y2="100" stroke="#2F2927" stroke-width="3" stroke-linecap="round"/>

  <!-- POSTE DERECHO -->
  <line x1="212" y1="78" x2="212" y2="210" stroke="#2F2927" stroke-width="7" stroke-linecap="round"/>
  <!-- Base poste derecho -->
  <line x1="200" y1="210" x2="224" y2="210" stroke="#2F2927" stroke-width="6" stroke-linecap="round"/>
  <!-- Anclaje cable en poste derecho -->
  <circle cx="212" cy="78" r="5" fill="#2F2927"/>
  <!-- Tirante diagonal de apoyo derecho -->
  <line x1="212" y1="95" x2="222" y2="135" stroke="#2F2927" stroke-width="3" stroke-linecap="round"/>

  <!-- PINZA / SUSPENSIÓN — enganche de la cabina al cable -->
  <!-- Punto en el cable aprox x=118: y = 42 + (78-42)*(118-18)/(222-18) = 42 + 36*100/204 ≈ 59.6 → 60 -->
  <!-- Rueda de trolley sobre el cable -->
  <circle cx="118" cy="60" r="8" fill="#2F2927" stroke="#2F2927" stroke-width="2"/>
  <!-- Brazos de la pinza -->
  <line x1="110" y1="56" x2="106" y2="65" stroke="#2F2927" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="126" y1="56" x2="130" y2="65" stroke="#2F2927" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Barra de suspensión vertical (desde pinza hasta techo de cabina) -->
  <line x1="118" y1="68" x2="118" y2="88" stroke="#2F2927" stroke-width="5" stroke-linecap="round"/>

  <!-- TECHO DE LA CABINA (trapecio ligeramente más ancho que el cuerpo) -->
  <path d="M 85 88 L 90 82 L 146 82 L 151 88 Z"
        fill="#6126FF" stroke="#2F2927" stroke-width="5" stroke-linejoin="round"/>

  <!-- CUERPO PRINCIPAL DE LA CABINA — rectangular redondeado -->
  <rect x="85" y="88" width="66" height="100" rx="10"
        fill="#6126FF" stroke="#2F2927" stroke-width="6" stroke-linejoin="round"/>

  <!-- VENTANA GRANDE SUPERIOR -->
  <rect x="97" y="100" width="42" height="38" rx="6"
        fill="#FFF200" stroke="#2F2927" stroke-width="3"/>
  <!-- Cruz divisoria de ventana -->
  <line x1="118" y1="100" x2="118" y2="138" stroke="#2F2927" stroke-width="2" stroke-linecap="round"/>
  <line x1="97"  y1="119" x2="139" y2="119" stroke="#2F2927" stroke-width="2" stroke-linecap="round"/>

  <!-- VENTANA INFERIOR (pequeña, tipo ojo de buey) -->
  <rect x="102" y="150" width="32" height="24" rx="5"
        fill="#FFF200" stroke="#2F2927" stroke-width="3"/>

  <!-- NERVIO / COLUMNA lateral izquierdo -->
  <line x1="99" y1="88" x2="99" y2="188" stroke="#2F2927" stroke-width="2.5" stroke-linecap="round"/>
  <!-- NERVIO / COLUMNA lateral derecho -->
  <line x1="137" y1="88" x2="137" y2="188" stroke="#2F2927" stroke-width="2.5" stroke-linecap="round"/>

  <!-- BANDA INFERIOR decorativa de la cabina -->
  <rect x="85" y="178" width="66" height="10" rx="0" fill="#2F2927"/>

  <!-- PUNTO DE MARCA (nodo corporativo) -->
  <circle cx="118" cy="200" r="6" fill="#FFF200" stroke="#2F2927" stroke-width="2"/>
</svg>
