<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;">
  <!-- BICICLETA CLÁSICA DE PASEO — Ruta Capital -->
  <!-- Colores: Amarillo #FFF200 principal, Morado #6126FF detalles, Oscuro #2F2927 líneas -->
  <!-- viewBox 240x240, bike centrada con margen -->

  <!-- RUEDAS (círculos externos) -->
  <!-- Rueda trasera: centro (68, 165), radio 42 -->
  <circle cx="68" cy="165" r="42" fill="none" stroke="#2F2927" stroke-width="6" stroke-linecap="round"/>
  <!-- Rueda delantera: centro (172, 165), radio 42 -->
  <circle cx="172" cy="165" r="42" fill="none" stroke="#2F2927" stroke-width="6" stroke-linecap="round"/>

  <!-- ARO interior (llanta) -->
  <circle cx="68" cy="165" r="32" fill="none" stroke="#2F2927" stroke-width="2"/>
  <circle cx="172" cy="165" r="32" fill="none" stroke="#2F2927" stroke-width="2"/>

  <!-- RAYOS rueda trasera — 8 rayos desde centro -->
  <line x1="68" y1="165" x2="68" y2="123" stroke="#2F2927" stroke-width="2"/>
  <line x1="68" y1="165" x2="68" y2="207" stroke="#2F2927" stroke-width="2"/>
  <line x1="68" y1="165" x2="26" y2="165" stroke="#2F2927" stroke-width="2"/>
  <line x1="68" y1="165" x2="110" y2="165" stroke="#2F2927" stroke-width="2"/>
  <line x1="68" y1="165" x2="38" y2="135" stroke="#2F2927" stroke-width="2"/>
  <line x1="68" y1="165" x2="98" y2="195" stroke="#2F2927" stroke-width="2"/>
  <line x1="68" y1="165" x2="98" y2="135" stroke="#2F2927" stroke-width="2"/>
  <line x1="68" y1="165" x2="38" y2="195" stroke="#2F2927" stroke-width="2"/>

  <!-- RAYOS rueda delantera — 8 rayos desde centro -->
  <line x1="172" y1="165" x2="172" y2="123" stroke="#2F2927" stroke-width="2"/>
  <line x1="172" y1="165" x2="172" y2="207" stroke="#2F2927" stroke-width="2"/>
  <line x1="172" y1="165" x2="130" y2="165" stroke="#2F2927" stroke-width="2"/>
  <line x1="172" y1="165" x2="214" y2="165" stroke="#2F2927" stroke-width="2"/>
  <line x1="172" y1="165" x2="142" y2="135" stroke="#2F2927" stroke-width="2"/>
  <line x1="172" y1="165" x2="202" y2="195" stroke="#2F2927" stroke-width="2"/>
  <line x1="172" y1="165" x2="202" y2="135" stroke="#2F2927" stroke-width="2"/>
  <line x1="172" y1="165" x2="142" y2="195" stroke="#2F2927" stroke-width="2"/>

  <!-- BUJE (hub) en cada rueda -->
  <circle cx="68" cy="165" r="5" fill="#FFF200" stroke="#2F2927" stroke-width="2"/>
  <circle cx="172" cy="165" r="5" fill="#FFF200" stroke="#2F2927" stroke-width="2"/>

  <!-- MARCO DE BICICLETA tipo holandés (cuadro alto, relajado) -->
  <!-- Eje pedalier: (120, 165) -->
  <!-- Tubo de dirección delantero: desde (158, 118) a (172, 165) -->
  <!-- Tubo del sillín: desde (120, 165) a (105, 110) -->
  <!-- Tubo superior: desde (105, 110) a (158, 118) -->
  <!-- Vaina baja: desde (120, 165) a (68, 165) — horizontal -->
  <!-- Vaina trasera: desde (105, 110) a (68, 165) -->
  <!-- Tubo diagonal: desde (120, 165) a (158, 118) -->

  <!-- Vaina inferior trasera: eje pedalier a buje trasero -->
  <line x1="120" y1="165" x2="68" y2="165" stroke="#FFF200" stroke-width="7" stroke-linecap="round"/>
  <!-- Vaina superior trasera: sillín a buje trasero -->
  <line x1="105" y1="110" x2="68" y2="165" stroke="#FFF200" stroke-width="7" stroke-linecap="round"/>
  <!-- Tubo diagonal: eje pedalier a tubo dirección -->
  <line x1="120" y1="165" x2="158" y2="118" stroke="#FFF200" stroke-width="7" stroke-linecap="round"/>
  <!-- Tubo superior (horizontal-suave): sillín a tubo dirección -->
  <line x1="105" y1="110" x2="158" y2="118" stroke="#FFF200" stroke-width="7" stroke-linecap="round"/>
  <!-- Tubo de dirección: cabeza a buje delantero -->
  <line x1="158" y1="118" x2="172" y2="165" stroke="#FFF200" stroke-width="7" stroke-linecap="round"/>
  <!-- Tubo del sillín (vertical): eje pedalier a sillín -->
  <line x1="120" y1="165" x2="105" y2="110" stroke="#FFF200" stroke-width="7" stroke-linecap="round"/>

  <!-- CONTORNO del marco (para dar volumen y limpieza) -->
  <line x1="120" y1="165" x2="68" y2="165" stroke="#2F2927" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="105" y1="110" x2="68" y2="165" stroke="#2F2927" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="120" y1="165" x2="158" y2="118" stroke="#2F2927" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="105" y1="110" x2="158" y2="118" stroke="#2F2927" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="158" y1="118" x2="172" y2="165" stroke="#2F2927" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="120" y1="165" x2="105" y2="110" stroke="#2F2927" stroke-width="2.5" stroke-linecap="round"/>

  <!-- MANUBRIO tipo holandés (alto y curvado hacia el ciclista) -->
  <!-- Vástago del manubrio: desde cabeza de dirección (158, 118) arriba a (155, 95) -->
  <line x1="158" y1="118" x2="155" y2="95" stroke="#2F2927" stroke-width="5" stroke-linecap="round"/>
  <!-- Barra del manubrio horizontal: de (140,92) a (170,92) -->
  <line x1="138" y1="92" x2="172" y2="92" stroke="#2F2927" stroke-width="5" stroke-linecap="round"/>
  <!-- Puños del manubrio -->
  <circle cx="138" cy="92" r="4" fill="#6126FF"/>
  <circle cx="172" cy="92" r="4" fill="#6126FF"/>

  <!-- SILLÍN (tipo holandés, amplio) -->
  <!-- Post del sillín: desde (105,110) a (100,90) -->
  <line x1="105" y1="110" x2="100" y2="90" stroke="#2F2927" stroke-width="4" stroke-linecap="round"/>
  <!-- Asiento del sillín (elipse ancha) -->
  <ellipse cx="96" cy="87" rx="18" ry="6" fill="#6126FF" stroke="#2F2927" stroke-width="2"/>
  <!-- Resortes del sillín (clásico) -->
  <line x1="96" y1="93" x2="100" y2="90" stroke="#2F2927" stroke-width="2"/>

  <!-- PEDAL y biela -->
  <!-- Biela izquierda: desde eje (120,165) a (108,178) -->
  <line x1="120" y1="165" x2="108" y2="178" stroke="#2F2927" stroke-width="4" stroke-linecap="round"/>
  <!-- Biela derecha: desde eje (120,165) a (132,152) -->
  <line x1="120" y1="165" x2="132" y2="152" stroke="#2F2927" stroke-width="4" stroke-linecap="round"/>
  <!-- Pedales -->
  <line x1="104" y1="178" x2="112" y2="180" stroke="#2F2927" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="128" y1="150" x2="136" y2="152" stroke="#2F2927" stroke-width="3.5" stroke-linecap="round"/>

  <!-- PLATO / corona del pedal -->
  <circle cx="120" cy="165" r="12" fill="none" stroke="#FFF200" stroke-width="4"/>
  <circle cx="120" cy="165" r="12" fill="none" stroke="#2F2927" stroke-width="2"/>

  <!-- CADENA (línea curva entre plato y piñón trasero) -->
  <!-- Simplificado: una línea de plato a rueda trasera -->
  <path d="M 110 157 Q 90 157 74 160" fill="none" stroke="#2F2927" stroke-width="2" stroke-dasharray="3,2"/>
  <path d="M 128 173 Q 100 174 74 170" fill="none" stroke="#2F2927" stroke-width="2" stroke-dasharray="3,2"/>

  <!-- GUARDABARRO delantero (arco) -->
  <path d="M 140 138 A 42 42 0 0 1 205 160" fill="none" stroke="#FFF200" stroke-width="5" stroke-linecap="round"/>
  <path d="M 140 138 A 42 42 0 0 1 205 160" fill="none" stroke="#2F2927" stroke-width="2" stroke-linecap="round"/>

  <!-- GUARDABARRO trasero -->
  <path d="M 36 150 A 42 42 0 0 1 100 138" fill="none" stroke="#FFF200" stroke-width="5" stroke-linecap="round"/>
  <path d="M 36 150 A 42 42 0 0 1 100 138" fill="none" stroke="#2F2927" stroke-width="2" stroke-linecap="round"/>

  <!-- CESTA delantera (acento de bicicleta holandesa) -->
  <rect x="140" y="95" width="26" height="18" rx="3" fill="#FFF200" stroke="#2F2927" stroke-width="2"/>
  <!-- Rejilla de cesta -->
  <line x1="148" y1="95" x2="148" y2="113" stroke="#2F2927" stroke-width="1.5"/>
  <line x1="156" y1="95" x2="156" y2="113" stroke="#2F2927" stroke-width="1.5"/>
  <line x1="140" y1="103" x2="166" y2="103" stroke="#2F2927" stroke-width="1.5"/>

  <!-- PUNTO de estación (acento morado — nodo de la marca) -->
  <circle cx="120" cy="165" r="7" fill="#6126FF" stroke="#2F2927" stroke-width="2"/>
</svg>
