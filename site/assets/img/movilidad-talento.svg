<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;">
  <!-- AVIONETA CLÁSICA (tipo Cessna) — Ruta Talento -->
  <!-- Colores: Verde #00C168 principal, Morado #6126FF detalles, Amarillo #FFF200, Oscuro #2F2927 contornos -->
  <!-- Vista lateral, morro/hélice hacia la derecha -->

  <!-- ===================== COLA ===================== -->
  <!-- Estabilizador horizontal (cola) -->
  <path d="M 36 118 L 54 118 L 54 129 L 36 134 Z"
        fill="#00C168" stroke="#2F2927" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Aleta vertical (fin de cola) -->
  <path d="M 43 118 L 43 88 C 43 80 50 78 56 83 L 60 100 L 54 118 Z"
        fill="#00C168" stroke="#2F2927" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Detalle morado en aleta vertical -->
  <path d="M 47 102 C 47 93 51 86 56 86" fill="none" stroke="#6126FF" stroke-width="3.5" stroke-linecap="round"/>

  <!-- ===================== FUSELAJE ===================== -->
  <!-- Cuerpo principal del fuselaje: alargado, apuntado atrás, redondeado adelante -->
  <path d="
    M 46 118
    L 46 129
    C 46 132 50 135 60 135
    L 180 135
    C 194 135 202 130 206 124
    C 210 118 210 111 206 105
    L 200 99
    C 190 93 172 91 157 91
    L 72 91
    C 57 91 49 97 46 105
    Z
  " fill="#00C168" stroke="#2F2927" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ===================== ALA ALTA (tipo Cessna, encima del fuselaje) ===================== -->
  <path d="
    M 82 91
    L 74 58
    C 72 50 69 44 66 42
    C 63 40 38 42 30 46
    C 26 48 24 53 27 57
    L 37 63
    L 82 74
    Z
  " fill="#00C168" stroke="#2F2927" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Franjas amarillas en ala -->
  <path d="M 50 57 L 56 71" fill="none" stroke="#FFF200" stroke-width="4" stroke-linecap="round"/>
  <path d="M 63 53 L 69 69" fill="none" stroke="#FFF200" stroke-width="4" stroke-linecap="round"/>

  <!-- Borde de ataque del ala -->
  <path d="M 30 46 C 36 44 52 43 70 44" fill="none" stroke="#2F2927" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ===================== MORRO ===================== -->
  <!-- Cono del morro -->
  <path d="
    M 200 99
    L 213 110
    C 217 114 217 118 213 122
    L 206 124
    Z
  " fill="#00C168" stroke="#2F2927" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ===================== CABINA / VENTANAS ===================== -->
  <!-- Techo de cabina elevada -->
  <path d="
    M 120 91
    L 122 77
    C 124 69 130 64 138 64
    C 150 64 160 69 165 79
    L 168 91
    Z
  " fill="#6126FF" stroke="#2F2927" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Ventana principal (vidrio cabina) -->
  <path d="
    M 124 91
    L 126 78
    C 128 72 133 68 139 68
    C 148 68 156 72 160 81
    L 162 91
    Z
  " fill="#FFFFFF" stroke="#2F2927" stroke-width="3" stroke-linejoin="round" opacity="0.93"/>

  <!-- Reflejo en ventana -->
  <path d="M 130 80 C 132 74 136 70 141 70" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>

  <!-- Ventana trasera (portilla) -->
  <rect x="112" y="96" width="13" height="11" rx="3.5"
        fill="#FFFFFF" stroke="#2F2927" stroke-width="2.5" opacity="0.88"/>

  <!-- ===================== FRANJA DECORATIVA LATERAL ===================== -->
  <path d="M 60 116 L 200 116" fill="none" stroke="#6126FF" stroke-width="4" stroke-linecap="round"/>
  <path d="M 60 109 L 196 109" fill="none" stroke="#FFF200" stroke-width="2" stroke-linecap="round" opacity="0.65"/>

  <!-- ===================== HÉLICE ===================== -->
  <!-- Buje de hélice -->
  <circle cx="215" cy="113" r="7" fill="#FFF200" stroke="#2F2927" stroke-width="4"/>

  <!-- Pala superior -->
  <path d="M 214 106 C 213 95 215 84 218 82 C 221 80 223 85 221 95 L 217 106 Z"
        fill="#2F2927" stroke="#2F2927" stroke-width="2" stroke-linejoin="round"/>

  <!-- Pala inferior -->
  <path d="M 216 120 C 217 131 215 142 212 144 C 209 146 207 141 209 131 L 213 120 Z"
        fill="#2F2927" stroke="#2F2927" stroke-width="2" stroke-linejoin="round"/>

  <!-- ===================== TREN DE ATERRIZAJE ===================== -->
  <!-- Strut derecho (delantero) -->
  <line x1="170" y1="135" x2="170" y2="162" stroke="#2F2927" stroke-width="5" stroke-linecap="round"/>
  <!-- Strut izquierdo (trasero) -->
  <line x1="146" y1="135" x2="146" y2="162" stroke="#2F2927" stroke-width="5" stroke-linecap="round"/>
  <!-- Eje horizontal -->
  <line x1="142" y1="162" x2="174" y2="162" stroke="#2F2927" stroke-width="5" stroke-linecap="round"/>

  <!-- Rueda derecha -->
  <circle cx="170" cy="168" r="10" fill="none" stroke="#2F2927" stroke-width="5"/>
  <circle cx="170" cy="168" r="5" fill="#6126FF" stroke="#2F2927" stroke-width="2"/>

  <!-- Rueda izquierda -->
  <circle cx="146" cy="168" r="10" fill="none" stroke="#2F2927" stroke-width="5"/>
  <circle cx="146" cy="168" r="5" fill="#6126FF" stroke="#2F2927" stroke-width="2"/>

  <!-- Rueda de cola (tailwheel) -->
  <line x1="52" y1="135" x2="52" y2="154" stroke="#2F2927" stroke-width="4" stroke-linecap="round"/>
  <circle cx="52" cy="160" r="6" fill="none" stroke="#2F2927" stroke-width="4"/>
  <circle cx="52" cy="160" r="3" fill="#6126FF" stroke="#2F2927" stroke-width="1.5"/>

</svg>
